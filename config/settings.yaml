# ============================================================================
# Robil Trade — setting non-secret. Semua threshold di sini, BUKAN hardcode.
# Nilai default dari IMPLEMENTATION_PLAN.md §7.3. Batas keras (GR-*) divalidasi
# oleh rtrade.core.config — config yang melemahkan guardrail akan DITOLAK saat load.
# ============================================================================

signal:
  confluence_min_score: 60        # 0-100, di bawah ini tidak jadi kandidat
  confidence_min: 0.55            # GR-09: di bawah ini → ABSTAIN
  max_signals_per_day_per_instrument: 3   # GR-12
  price_drift_max_pct: 0.5        # GR-06: deviasi harga live vs entry
  candle_staleness_factor: 2      # GR-06: candle terakhir ≤ 2×TF

  edge_quality:                   # pre-confluence adverse-selection filter
    enabled: true
    min_score: 65
    max_spread_atr: 0.12          # reject spread > 12% of ATR
    min_atr_percentile: 8         # dead market filter
    max_atr_percentile: 96        # volatility shock filter
    max_opposing_wick_ratio: 0.62 # rejection wick against trade direction
    max_total_wick_body_ratio: 6
    min_body_atr: 0.03
    min_volume_ratio: 0.55
    volume_window: 20
    max_range_expansion_atr: 2.8
    max_entry_distance_atr: 1.25

  profiles:                       # SP-4: soft-threshold profiles (NO hard floors here)
    default:                      # = current global values; used by swing S1/S2
      confluence_min_score: 60
      edge_quality_min_score: 65
      confidence_min: 0.55
      max_signals_per_day_per_instrument: 3
    scalping:                     # more permissive entry bar for M5/M15 scalpers
      confluence_min_score: 50
      edge_quality_min_score: 55
      confidence_min: 0.50
      max_signals_per_day_per_instrument: 10

risk:
  risk_per_trade_pct: 1.0         # default saran sizing (hard cap 2.0 — GR-05)
  rr_min: 1.5                     # GR-03 hard floor (config < 1.5 ditolak)
  rr_target: 2.0                  # target TP default
  sl_atr_min: 0.5                 # GR-04
  sl_atr_max: 3.0                 # GR-04 hard cap (config > 3.0 ditolak)
  news_blackout_before_min: 30    # GR-07
  news_blackout_after_min: 15
  expectancy_guard_window: 30     # GR-13: rolling N paper-trades
  equity_usd: 10000               # equity acuan sizing (ubah sesuai akun)
  throttle_enabled: true           # T27: reduce risk on losing streak
  throttle_window: 10              # T27: rolling window for throttle
  throttle_mult: 0.5               # T27: risk multiplier when throttled

llm:
  enabled: false                  # P1=false, P2=true
  analyst_model: gemini/gemini-3.1-flash-lite
  critic_model: gemini/gemini-3.1-flash-lite
  temperature: 0.2
  max_confidence_adjust: 0.15     # LLM hanya boleh geser confidence ±0.15
  timeout_seconds: 45
  flagship_model: gemini/gemini-2.5-pro   # F5: cascade escalation
  escalation_low: 0.48            # F5: doubt band lower
  escalation_high: 0.63           # F5: doubt band upper
  coroner_enabled: false          # T30: post-mortem SL analysis
  # --- Budget guard (G-11) ---
  budget:
    max_tokens_per_scan: 20000
    max_usd_per_day: 5.0
    max_wall_seconds_per_scan: 45
    max_steps_per_scan: 8
  # --- Adaptive cooldown pool (multi-account fallback) ---
  # TTL cooldown per tier error. Tiap nilai harus di (0, 21600] detik (6 jam).
  pool:
    cooldown_seconds: 60              # 429 transient → cooldown singkat, langsung rotasi
    auth_cooldown_seconds: 300        # auth error (key/token invalid) → cooldown menengah
    subscription_cooldown_seconds: 18000  # limit langganan/usage-window (~5 jam, mis. ChatGPT/SuperGrok) → parkir lama
  # --- Credential pool (A6-A9) ---
  # Pool fallback dibangun OTOMATIS dari semua kredensial yang ada, urutan:
  #   1) API key family model analyst (slot 1..N), 2) API key family lain,
  #   3) akun OAuth CLI tersimpan (auth_profiles cli_oauth), 4) akun ADC Vertex.
  # Kena 429/auth error → kredensial cooldown 60s → otomatis pindah ke berikutnya.
  # Multi-akun OAuth: python -m rtrade.cli.auth login --provider <id> --account <label>

backtest:
  min_trades_for_validation: 100
  walkforward:
    train_months: 12
    test_months: 3
    step_months: 3
  gates:                          # §8.11.4
    oos_expectancy_after_costs: "> 0"
    oos_profit_factor: ">= 1.15"
    deflated_sharpe_prob: ">= 0.90"
    pbo_max: 0.30
    max_drawdown_pct: 25

calendar:
  fail_open_when_stale: false
  stale_after_hours: 18
  sync_lookback_days: 1
  sync_lookforward_days: 7
  sources:
    - { name: investing, enabled: true }
    - { name: nasdaq, enabled: true }
    - { name: static_high_impact, enabled: true }
