# ============================================================================
# Parameter Strategi S1 — Trend-Pullback (IMPLEMENTATION_PLAN.md §8.4).
# Diimplementasikan di P1-T7. Parameter HANYA boleh dituning via walk-forward
# harness (PLAN §8.11.3) — dilarang tuning manual terhadap test set.
# ============================================================================

strategy: s1_trend_pullback
timeframe_signal: "1h"
timeframe_confirm: "4h"

trend:
  ema_fast: 21
  ema_mid: 50
  ema_slow: 200
  adx_period: 14
  adx_min: 20

pullback:
  zone_low_ema: 21          # zona pullback = [EMA21 .. EMA50]
  zone_high_ema: 50
  touch_lookback_bars: 3
  rsi_period: 14
  rsi_min: 35
  rsi_max: 55

levels:
  sl_swing_buffer_atr: 0.25
  sl_fallback_atr: 1.0
  rr_target: 2.0
  valid_bars: 6             # limit tak tersentuh dalam 6 bar → sinyal expired

# SP-5 opt-in confirmations. ALL default OFF — enabling any requires a fresh
# walk-forward backtest pass (SP-6) before going live. Disabled = behavior
# identical to the original S1.
confirmation:
  supertrend_enabled: false
  supertrend_period: 10
  supertrend_multiplier: 3.0
  adx_filter_enabled: false
  adx_threshold: 25.0
  choppiness_enabled: false
  choppiness_period: 14
  choppiness_max: 38.2          # CI below this = trending enough to trade
  mtf_ema_bias_enabled: false   # HTF bias injected via df.attrs["s1_htf_bias"] by SP-2

confluence_weights:         # total 100 — §8.6
  trend: 25
  momentum: 20
  structure: 20
  volume: 15
  macro: 20
