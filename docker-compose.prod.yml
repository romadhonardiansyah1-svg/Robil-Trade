# ============================================================================
# Robil Trade — Production Docker Compose Overlay
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# Ref: IMPLEMENTATION_PLAN §13, D1–D5
# ============================================================================

services:
  # === Override DB for production ===
  db:
    restart: unless-stopped
    environment:
      POSTGRES_USER: rtrade
      POSTGRES_PASSWORD: ${RTRADE_DB_PASSWORD}
      POSTGRES_DB: rtrade
    ports: []  # Remove host binding — internal only in prod
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 2G

  # === Override Redis for production ===
  redis:
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    ports: []  # Remove host binding
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 512M

  # === Main Application (Scheduler) ===
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      ENV: prod
      LOG_LEVEL: INFO
      DATABASE_URL: postgresql+asyncpg://rtrade:${RTRADE_DB_PASSWORD}@db:5432/rtrade
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./reports:/app/reports
      - ./data:/app/data
      - ./logs:/app/logs
      - ./models:/app/models
    networks:
      - internal
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import rtrade.scheduler.main"]
      interval: 60s
      timeout: 10s
      retries: 3
    # S7: container hardening
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp
      - /home/rtrade/.cache
    deploy:
      resources:
        limits:
          memory: 2G

  # === API Server (uvicorn) ===
  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      ENV: prod
      LOG_LEVEL: INFO
      DATABASE_URL: postgresql+asyncpg://rtrade:${RTRADE_DB_PASSWORD}@db:5432/rtrade
      REDIS_URL: redis://redis:6379/0
    command: ["python", "-m", "uvicorn", "rtrade.delivery.api.app:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "2"]
    networks:
      - internal
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    # S7: container hardening
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          memory: 1G

  # === Telegram Bot (polling) ===
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    profiles: ["telegram"]
    env_file: .env
    environment:
      ENV: prod
      LOG_LEVEL: INFO
      DATABASE_URL: postgresql+asyncpg://rtrade:${RTRADE_DB_PASSWORD}@db:5432/rtrade
      REDIS_URL: redis://redis:6379/0
    command: ["python", "-m", "rtrade.cli.bot"]
    networks:
      - internal
    depends_on:
      db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
    # S7: container hardening
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp

  # === Caddy Reverse Proxy (TLS + Auth) ===
  caddy:
    image: caddy:2.9-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:-localhost}
      API_AUTH_TOKEN: ${API_AUTH_TOKEN:-changeme}
    volumes:
      - ./config/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - internal
    depends_on:
      - api

  # === DB Backup Cron ===
  backup:
    image: postgres:16.8-alpine
    restart: unless-stopped
    environment:
      PGPASSWORD: ${RTRADE_DB_PASSWORD}
    volumes:
      - ./scripts/backup_db.sh:/backup.sh:ro
      - backupdata:/backups
    entrypoint: ["/bin/sh", "-c"]
    command: |
      "echo '0 3 * * * /bin/sh /backup.sh' | crontab - && crond -f -l 2"
    networks:
      - internal
    depends_on:
      db:
        condition: service_healthy

networks:
  internal:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
  backupdata:
