# ============================================================================
# Robil Trade — Production Docker Compose Overlay
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# Ref: IMPLEMENTATION_PLAN §13
# ============================================================================

services:
  # === Override DB for production ===
  db:
    restart: unless-stopped
    environment:
      POSTGRES_USER: rtrade
      POSTGRES_PASSWORD: ${RTRADE_DB_PASSWORD}
      POSTGRES_DB: rtrade
    ports: []  # Remove host binding — internal only in prod
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 2G

  # === Override Redis for production ===
  redis:
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    ports: []  # Remove host binding
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 512M

  # === LiteLLM Proxy ===
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    restart: unless-stopped
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
      GEMINI_API_KEY_1: ${GEMINI_API_KEY_1}
      GEMINI_API_KEY_2: ${GEMINI_API_KEY_2:-}
      ANTHROPIC_API_KEY_1: ${ANTHROPIC_API_KEY_1:-}
      OPENAI_API_KEY_1: ${OPENAI_API_KEY_1:-}
    volumes:
      - ./config/litellm.yaml:/app/config.yaml:ro
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    networks:
      - internal
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:4000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
    depends_on:
      redis:
        condition: service_healthy

  # === Main Application (Scheduler + API) ===
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      ENV: prod
      LOG_LEVEL: INFO
      DATABASE_URL: postgresql+asyncpg://rtrade:${RTRADE_DB_PASSWORD}@db:5432/rtrade
      REDIS_URL: redis://redis:6379/0
      LITELLM_BASE_URL: http://litellm:4000
    volumes:
      - ./reports:/app/reports
      - ./data:/app/data
      - ./logs:/app/logs
    networks:
      - internal
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      litellm:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 2G

  # === API Server (uvicorn) ===
  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      ENV: prod
      LOG_LEVEL: INFO
      DATABASE_URL: postgresql+asyncpg://rtrade:${RTRADE_DB_PASSWORD}@db:5432/rtrade
      REDIS_URL: redis://redis:6379/0
      LITELLM_BASE_URL: http://litellm:4000
    command: ["python", "-m", "uvicorn", "rtrade.api.main:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "2"]
    networks:
      - internal
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1G

  # === Caddy Reverse Proxy (TLS + Auth) ===
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./config/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - internal
    depends_on:
      - api

  # === DB Backup Cron ===
  backup:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      PGPASSWORD: ${RTRADE_DB_PASSWORD}
    volumes:
      - ./scripts/backup_db.sh:/backup.sh:ro
      - backupdata:/backups
    entrypoint: ["/bin/sh", "-c"]
    command: |
      "echo '0 3 * * * /bin/sh /backup.sh' | crontab - && crond -f -l 2"
    networks:
      - internal
    depends_on:
      db:
        condition: service_healthy

networks:
  internal:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
  backupdata:
